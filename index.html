<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS – V54</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

<style>
body {font-family: Arial; background:#eef2f5; padding:20px;}
.container {max-width:850px;margin:auto;background:#fff;padding:20px;border-radius:8px;}
input, select {width:100%; padding:10px; margin:6px 0;}
button {width:100%; padding:15px; background:#003366; color:#fff; border:none;}
canvas {margin-top:10px;}
</style>
</head>

<body>

<div class="container">
<h2>FSTL COMET OS – VERIFIED PROPERTY DEMO</h2>

<select id="scenario" onchange="prefill()">
<option value="">Select Scenario</option>
<option value="1">Residential</option>
<option value="2">Commercial</option>
<option value="3">Mixed Use</option>
</select>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="ownerAddress" placeholder="Owner Address">

<input id="propertyAddress" placeholder="Property Address">
<input id="description" placeholder="Property Description (e.g. 3-Bedroom Duplex)">
<input id="size" placeholder="Property Size (e.g. 500 sqm)">
<input id="location" placeholder="Property Location (City / State)">

<input id="bvn" placeholder="BVN">
<input id="nin" placeholder="NIN">
<input id="agent" placeholder="Agent Code">

<button onclick="generatePDF()">GENERATE VERIFIED PROPERTY PDF</button>

<h3>Scan to Verify</h3>
<canvas id="qr"></canvas>
</div>

<script>
const { jsPDF } = window.jspdf;

const scenarios = {
1:{
name:"John Doe",phone:"08012345678",email:"john@email.com",
ownerAddress:"Abuja Nigeria",
propertyAddress:"GRA Benin City",
description:"Residential Land",
size:"500 sqm",
location:"Benin City, Edo State",
bvn:"12345678901",nin:"98765432101",agent:"AGT-001"
},
2:{
name:"Jane Smith",phone:"08023456789",email:"jane@email.com",
ownerAddress:"Lagos Nigeria",
propertyAddress:"Ikeja Lagos",
description:"Office Complex",
size:"1200 sqm",
location:"Ikeja, Lagos State",
bvn:"23456789012",nin:"87654321098",agent:"AGT-002"
},
3:{
name:"Michael King",phone:"08034567890",email:"mike@email.com",
ownerAddress:"Lagos Nigeria",
propertyAddress:"Victoria Island",
description:"Mixed Use Building",
size:"800 sqm",
location:"Victoria Island, Lagos",
bvn:"34567890123",nin:"76543210987",agent:"AGT-003"
}
};

function prefill(){
let s = scenarios[scenario.value];
if(!s) return;
for(let key in s){ document.getElementById(key).value = s[key]; }
}

function header(doc){
doc.setFontSize(10);
doc.text("FIRST STANDARD TITLE LIMITED (FSTL)",20,10);
doc.text("FSTL COMET OS – Verification & Title Insurance Engine",20,15);
doc.line(20,18,190,18);
}

function footer(doc){
doc.line(20,280,190,280);
doc.setFontSize(8);
doc.text("FSTL COMET OS DEMO",20,285);
doc.text("Contact: +234 803 588 8622 | info@fstl.com.ng",20,290);
}

function addPage(doc,title,lines){
doc.addPage(); header(doc);
doc.setFontSize(14);
doc.text(title,20,30);
doc.setFontSize(10);

let y=45;
lines.forEach(line=>{
doc.text(line,20,y);
y+=8;
});
footer(doc);
}

function generatePDF(){

let id = "FSTL-" + Date.now();
let time = new Date().toLocaleString();

// QR
new QRious({
element: document.getElementById("qr"),
value: "https://fstl-demo/verify?id=" + id,
size:150
});
let qrImg = document.getElementById("qr").toDataURL("image/png");

let doc = new jsPDF();

// PAGE 1 – IMPACT
header(doc);
doc.setFontSize(16);
doc.text("VERIFIED PROPERTY RECORD",20,40);
doc.setFontSize(11);
doc.text("FSTL COMET OS INTELLIGENCE ENGINE",20,50);

doc.text("Verification ID: " + id,20,65);
doc.text("Timestamp: " + time,20,72);

doc.text("STATUS: VERIFIED",20,90);
doc.text("CONFIDENCE LEVEL: HIGH",20,98);

doc.text("Owner: " + name.value,20,115);
doc.text("Property: " + propertyAddress.value,20,123);

doc.text("Scan QR to verify",140,100);
doc.addImage(qrImg,"PNG",140,110,50,50);

footer(doc);

// PAGE 2 – OWNER
addPage(doc,"OWNER IDENTITY",[
"Name: "+name.value,
"Phone: "+phone.value,
"Email: "+email.value,
"Address: "+ownerAddress.value,
"BVN: "+bvn.value,
"NIN: "+nin.value
]);

// PAGE 3 – PROPERTY (FIXED 🔥)
addPage(doc,"PROPERTY DETAILS",[
"Address: "+propertyAddress.value,
"Description: "+description.value,
"Size: "+size.value,
"Location: "+location.value
]);

// PAGE 4 – VERIFICATION + SECURITY
addPage(doc,"VERIFICATION & SECURITY STRUCTURE",[
"This record links identity (BVN + NIN) with property data.",
"",
"A unique ID and timestamp ensure traceability.",
"",
"QR code enables quick verification reference.",
"",
"AI-assisted validation improves consistency.",
"",
"Any alteration may invalidate record integrity."
]);

// PAGE 5 – TITLE INSURANCE + VALUE
addPage(doc,"TITLE INSURANCE & VALUE",[
"Title insurance protects against fraud and disputes.",
"",
"It enhances trust and supports institutional acceptance.",
"",
"This transforms property into a structured, usable asset.",
"",
"It enables safer transactions and financial consideration."
]);

// PAGE 6 – USE CASES
addPage(doc,"APPLICATION",[
"OWNER:",
"- Prove ownership",
"- Approach financial institutions",
"",
"AGENT:",
"- Facilitate transactions",
"- Generate reports",
"",
"INSTITUTION:",
"- Assess ownership credibility",
"- Reduce fraud exposure"
]);

// PAGE 7 – Q&A + DEMO
addPage(doc,"Q&A + DEMONSTRATION NOTICE",[
"Verifiable? Yes via QR.",
"Final? No – Demo version.",
"",
"Full verification requires ₦25,000.",
"",
"Live system integrates with institutions."
]);

doc.save(id + ".pdf");

}
</script>

</body>
</html>
