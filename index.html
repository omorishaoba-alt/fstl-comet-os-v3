<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS V5</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f7fa; color:#1a1a1a; margin:0; padding:0; }
header{background:#004aad;color:#fff;padding:20px;text-align:center;}
main{padding:20px;max-width:900px;margin:auto;}
form, #verifySection{background:#fff;padding:20px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.1); margin-top:20px;}
label{display:block;margin-top:15px;font-weight:bold;}
input{width:100%;padding:10px;margin-top:5px;border-radius:4px;border:1px solid #ccc;}
button{margin-top:20px;padding:12px 20px;background:#004aad;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:16px;}
button:hover{background:#003380;}
.valid{color:green;font-weight:bold;}
.invalid{color:red;font-weight:bold;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

<header>
<h1>FSTL COMET OS V5</h1>
<p>All-in-One Verification System</p>
</header>

<main>

<!-- PDF Generation Form -->
<h2>Generate Verification PDF</h2>
<form id="osTestForm">
  <label>Name</label><input type="text" id="name" required>
  <label>Email</label><input type="email" id="email" required>
  <label>Phone</label><input type="text" id="phone" required>
  <label>Address</label><input type="text" id="address" required>
  <label>BVN</label><input type="text" id="bvn" required>
  <label>NIN</label><input type="text" id="nin" required>
  <button type="submit">Generate PDF</button>
</form>

<!-- Verification Section -->
<h2>Verify Record</h2>
<div id="verifySection">
  <label>Enter Verification ID</label>
  <input type="text" id="verifyID" placeholder="FSTL-...">
  <button id="verifyBtn">Verify</button>
  <p id="verifyResult"></p>
</div>

</main>

<script>
// PDF Generation
const form = document.getElementById('osTestForm');
form.addEventListener('submit', function(e){
  e.preventDefault();

  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const address = document.getElementById('address').value.trim();
  const bvn = document.getElementById('bvn').value.trim();
  const nin = document.getElementById('nin').value.trim();

  if(!name || !email || !phone || !address || !bvn || !nin){
    alert("All fields required");
    return;
  }

  // Verification ID + timestamp
  const timestamp = new Date().toISOString();
  const verificationID = "FSTL-" + Date.now();

  // Hash
  const rawData = name+email+phone+address+bvn+nin+timestamp;
  const hash = CryptoJS.SHA256(rawData).toString();

  // Save to localStorage
  const record = { verificationID, timestamp, name, email, phone, address, bvn, nin, hash };
  localStorage.setItem(verificationID, JSON.stringify(record));

  // Generate PDF
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16);
  doc.text("FSTL OS Verification PDF", 20, 20);
  doc.setFontSize(12);
  doc.text(`Verification ID: ${verificationID}`, 20, 35);
  doc.text(`Timestamp: ${timestamp}`, 20, 45);
  doc.text(`Name: ${name}`, 20, 60);
  doc.text(`Email: ${email}`, 20, 70);
  doc.text(`Phone: ${phone}`, 20, 80);
  doc.text(`Address: ${address}`, 20, 90);
  doc.text(`BVN: ${bvn}`, 20, 100);
  doc.text(`NIN: ${nin}`, 20, 110);
  doc.text(`Hash: ${hash.substring(0,20)}...`, 20, 120);
  doc.text("QR embedded for verification", 20, 135);

  // QR points internally to verification section
  const verifyURL = `#${verificationID}`;
  const qrDiv = document.createElement('div');
  new QRCode(qrDiv, verifyURL);
  const qrCanvas = qrDiv.querySelector('canvas');
  const qrDataURL = qrCanvas.toDataURL("image/png");
  doc.addImage(qrDataURL, 'PNG', 150, 30, 40, 40);

  doc.save(`${verificationID}.pdf`);
  alert("PDF generated. Use Verification ID to verify below.");
});

// Verification
const verifyBtn = document.getElementById('verifyBtn');
verifyBtn.addEventListener('click', function(){
  const id = document.getElementById('verifyID').value.trim();
  const result = document.getElementById('verifyResult');

  if(!id){ result.innerHTML="Please enter a Verification ID"; return; }

  const recordJSON = localStorage.getItem(id);
  if(recordJSON){
    const record = JSON.parse(recordJSON);
    result.innerHTML = `<span class="valid">✅ VALID RECORD FOUND</span><br>
    ID: ${record.verificationID}<br>Name: ${record.name}<br>Address: ${record.address}<br>Timestamp: ${record.timestamp}`;
  } else {
    result.innerHTML = `<span class="invalid">❌ INVALID / NOT FOUND</span>`;
  }
});
</script>

</body>
</html>
