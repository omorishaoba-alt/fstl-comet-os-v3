<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS – Public Demo</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0a0a0a;
  color:#fff;
  text-align:center;
  padding:40px;
}
h1{font-size:22px;margin-bottom:10px}
p{opacity:0.8}
button{
  padding:14px 28px;
  font-size:16px;
  margin-top:25px;
  background:#1e90ff;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
button:hover{background:#0d6efd;}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

<h1>FSTL COMET OS</h1>
<p>Title Verification & Title Insurance Demonstration</p>
<p>Click below to generate a full verification document</p>

<button onclick="generatePDF()">Generate Verification PDF</button>

<div id="qr" style="display:none;"></div>

<script>

// 🔴 PREFILL DATA (PROFESSIONAL DEMO)
const data = {
id:"FSTL-"+Date.now(),
time:new Date().toLocaleString(),
name:"Sample Property Owner",
phone:"+2348012345678",
address:"19 Egbor Avenue, GRA Benin City, Edo State",
bvn:"12345678901",
nin:"A1234567890",
property:"Residential Duplex (4 Bedroom)",
location:"GRA, Benin City",
mode:"DIRECT",
fstlFee:25000,
agentName:"DIRECT",
agentCode:"N/A",
agentProfit:0,
total:25000
};

// 🔗 VERIFY LINK
let verifyURL = location.href.split("?")[0] + "?data=" + encodeURIComponent(JSON.stringify(data));

// QR GENERATION
let qrDiv = document.getElementById("qr");
new QRCode(qrDiv,{text:verifyURL,width:200,height:200});

// REGISTRY PLACEHOLDER
function logRegistry(d){
/*
fetch("YOUR_REGISTRY_ENDPOINT",{
method:"POST",
body:JSON.stringify(d)
});
*/
}

// PDF GENERATION
function generatePDF(){

logRegistry(data);

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

// HEADER
function header(){
doc.setFontSize(10);
doc.text("FIRST STANDARD TITLE LIMITED",20,10);
doc.text("fstlofficialsite@gmail.com | +2348035888622",20,15);
doc.line(20,18,190,18);
}

// FOOTER
function footer(){
doc.line(20,280,190,280);
doc.setFontSize(8);
doc.text("FSTL COMET OS – Verified Record",20,285);
doc.text("Account: 2025222557 (First Bank)",20,290);
}

// PAGE 1 — COVER
header();
doc.setFontSize(14);
doc.text("TITLE VERIFICATION REPORT",20,30);

doc.setFontSize(10);
doc.text("Verification ID: "+data.id,20,40);
doc.text("Timestamp: "+data.time,20,46);

doc.text("This document is a structured verification record",20,60);
doc.text("generated under FSTL COMET OS.",20,66);

let qrImg = qrDiv.querySelector("canvas").toDataURL("image/png");
doc.addImage(qrImg,"PNG",140,40,50,50);

footer();

// PAGE 2 — OWNER
doc.addPage(); header();
doc.text("OWNER IDENTITY",20,30);
doc.text("Name: "+data.name,20,40);
doc.text("Phone: "+data.phone,20,46);
doc.text("Address: "+data.address,20,52);
doc.text("BVN: "+data.bvn,20,58);
doc.text("NIN: "+data.nin,20,64);
footer();

// PAGE 3 — PROPERTY
doc.addPage(); header();
doc.text("PROPERTY DETAILS",20,30);
doc.text(data.property,20,40);
doc.text(data.location,20,46);
footer();

// PAGE 4 — TRANSACTION
doc.addPage(); header();
doc.text("TRANSACTION STRUCTURE",20,30);
doc.text("Mode: "+data.mode,20,40);
doc.text("FSTL Fee: ₦"+data.fstlFee,20,46);
doc.text("Agent: "+data.agentName,20,52);
doc.text("Agent Code: "+data.agentCode,20,58);
doc.text("Agent Earnings: ₦"+data.agentProfit,20,64);
doc.text("Total Paid: ₦"+data.total,20,70);
footer();

// PAGE 5 — HOW IT WORKS
doc.addPage(); header();
doc.text("SYSTEM PROCESS",20,30);
doc.text("1. Data captured",20,40);
doc.text("2. Record generated",20,46);
doc.text("3. QR embedded",20,52);
doc.text("4. Verification shared",20,58);
footer();

// PAGE 6 — SECURITY
doc.addPage(); header();
doc.text("SECURITY STRUCTURE",20,30);
doc.text("• Unique ID",20,40);
doc.text("• Timestamp",20,46);
doc.text("• QR Verification",20,52);
doc.text("• Registry linkage (pending activation)",20,58);
footer();

// PAGE 7 — LEGAL
doc.addPage(); header();
doc.text("LEGAL DECLARATION",20,30);
doc.text("This document is issued as a verification record",20,40);
doc.text("under FSTL COMET OS.",20,46);
doc.text("Scope limited to Title Verification and Title Insurance.",20,52);
doc.text("Mortgage and lending are excluded.",20,58);
footer();

// PAGE 8 — USAGE
doc.addPage(); header();
doc.text("HOW TO USE",20,30);
doc.text("Property Owners: Present as verified record.",20,40);
doc.text("Financial Institutions: Scan QR to validate.",20,46);
footer();

// PAGE 9 — NEXT STEP (SOFT REVENUE SIGNAL)
doc.addPage(); header();
doc.text("NEXT STEP",20,30);
doc.text("This is a demonstration sample.",20,40);
doc.text("Live verification requires payment of ₦25,000.",20,46);
doc.text("Activation will be enabled upon institutional integration.",20,60);
footer();

// SAVE
doc.save(data.id+".pdf");

}

// VERIFY PAGE
const params = new URLSearchParams(window.location.search);
if(params.has("data")){
let d = JSON.parse(decodeURIComponent(params.get("data")));
document.body.innerHTML = `
<h2>VERIFIED RECORD</h2>
<p>ID: ${d.id}</p>
<p>NAME: ${d.name}</p>
<p>STATUS: VERIFIED</p>
<p>This record can be cross-checked via FSTL registry.</p>
`;
}

</script>

</body>
</html>
