<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS V38</title>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0}
header,footer{background:#000;color:#fff;text-align:center;padding:15px}
main{padding:15px;max-width:900px;margin:auto}
form{background:#fff;padding:15px;border-radius:8px}
input,textarea{width:100%;padding:10px;margin-top:8px}
button{margin-top:15px;padding:12px;width:100%;background:#000;color:#fff;border:none}
#qrModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center}
#qrBox{background:#fff;padding:20px;border-radius:8px;text-align:center}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

<header>
<h2>FSTL COMET OS V38</h2>
<p>FIRST STANDARD TITLE LIMITED</p>
<p>Account: 2025222557 (First Bank)</p>
<p>Email: fstlofficialsite@gmail.com | +2348035888622</p>
</header>

<main id="app"></main>

<footer>
FSTL – Title Verification & Title Insurance ONLY
</footer>

<div id="qrModal">
<div id="qrBox">
<h3>SCAN QR – LIVE VERIFICATION</h3>
<div id="qrCanvas"></div>
<button onclick="closeQR()">CONFIRM</button>
</div>
</div>

<script>

// ROUTING
const params = new URLSearchParams(window.location.search);
if(params.has("data")){renderVerify();} else {renderForm();}

// FORM
function renderForm(){
document.getElementById("app").innerHTML=`
<form id="form">

<h3>OWNER</h3>
<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Phone" required>
<input id="address" placeholder="Address" required>
<input id="bvn" placeholder="BVN" required>
<input id="nin" placeholder="NIN" required>

<h3>PROPERTY</h3>
<textarea id="property" placeholder="Property Description" required></textarea>
<input id="location" placeholder="Location" required>

<h3>TRANSACTION</h3>
<input id="agentName" placeholder="Agent Name" required>
<input id="amount" placeholder="Total Fee Paid" required>

<h3>PAYMENT PROOF</h3>
<input type="file" id="proof" accept="image/*" required>

<button>GENERATE IRREFUTABLE PDF</button>

</form>
`;
document.getElementById("form").onsubmit=generate;
}

// GENERATE
async function generate(e){
e.preventDefault();

const FEE=25000;

let data={
id:"FSTL-"+Date.now(),
time:new Date().toLocaleString(),
agentCode:"AG-"+Math.floor(Math.random()*1000000),

name:val("name"),
phone:val("phone"),
address:val("address"),
bvn:val("bvn"),
nin:val("nin"),

property:val("property"),
location:val("location"),

agentName:val("agentName"),
amount:parseInt(val("amount"))
};

data.agentProfit=data.amount-FEE;

// LIVE URL
let encoded=encodeURIComponent(JSON.stringify(data));
let verifyURL=location.href.split("?")[0]+"?data="+encoded;

// QR POPUP
showQR(verifyURL);
await wait(500);

let qrCanvas=document.querySelector("#qrCanvas canvas");
let qrImage=qrCanvas.toDataURL("image/png");

// PAYMENT IMAGE
let proof=await toBase64(document.getElementById("proof").files[0]);

// PDF
const { jsPDF } = window.jspdf;
let doc=new jsPDF();

// PAGE 1
header(doc);
doc.setFontSize(14);
doc.text("TITLE VERIFICATION REPORT",20,30);

doc.setFontSize(10);
doc.text("ID: "+data.id,20,40);
doc.text("TIME: "+data.time,20,46);
doc.text("AGENT CODE: "+data.agentCode,20,52);

doc.text("OWNER",20,65);
doc.text(data.name,20,71);
doc.text(data.phone,20,77);
doc.text(data.address,20,83);
doc.text("BVN: "+data.bvn,20,89);
doc.text("NIN: "+data.nin,20,95);

doc.text("PROPERTY",20,110);
doc.text(data.property,20,116);
doc.text(data.location,20,122);

doc.text("TRANSACTION",20,137);
doc.text("Agent: "+data.agentName,20,143);
doc.text("Total: ₦"+data.amount,20,149);
doc.text("FSTL: ₦"+FEE,20,155);
doc.text("Agent Earns: ₦"+data.agentProfit,20,161);

doc.addImage(qrImage,"PNG",140,40,50,50);

footer(doc);

// PAGE 2
doc.addPage();
header(doc);

doc.text("LEGAL DECLARATION",20,30);
doc.text("This document is issued by FIRST STANDARD TITLE LIMITED.",20,40);
doc.text("It confirms submission and verification under FSTL COMET OS.",20,46);

doc.text("Scope of FSTL:",20,60);
doc.text("- Title Verification",20,66);
doc.text("- Title Insurance",20,72);

doc.text("Mortgage, lending, or collateralization is excluded.",20,84);
doc.text("This document is verifiable via QR scan.",20,96);

footer(doc);

// PAGE 3
doc.addPage();
header(doc);

doc.text("PAYMENT PROOF",20,30);
doc.addImage(proof,"JPEG",20,40,160,100);

footer(doc);

doc.save(data.id+".pdf");

closeQR();
alert("IRREFUTABLE DOCUMENT GENERATED");

// WHATSAPP SHARE
let msg=encodeURIComponent("FSTL VERIFIED PROPERTY\nID:"+data.id+"\nScan QR to verify");
window.open("https://wa.me/?text="+msg);

}

// VERIFY PAGE
function renderVerify(){
let data=JSON.parse(decodeURIComponent(params.get("data")));
document.getElementById("app").innerHTML=`
<div style="background:#fff;padding:15px;border-radius:8px">
<h3>VERIFICATION CONFIRMED</h3>
<p><b>ID:</b> ${data.id}</p>
<p><b>TIME:</b> ${data.time}</p>
<p><b>AGENT CODE:</b> ${data.agentCode}</p>
<p><b>NAME:</b> ${data.name}</p>
<p><b>PHONE:</b> ${data.phone}</p>
<p><b>BVN:</b> ${data.bvn}</p>
<p><b>NIN:</b> ${data.nin}</p>
<p><b>PROPERTY:</b> ${data.property}</p>
<p><b>STATUS:</b> VERIFIED & TITLE INSURABLE</p>
</div>
`;
}

// HELPERS
function val(id){return document.getElementById(id).value;}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}
function toBase64(file){
return new Promise((res,rej)=>{
let r=new FileReader();
r.readAsDataURL(file);
r.onload=()=>res(r.result);
r.onerror=e=>rej(e);
});
}

// QR POPUP
function showQR(url){
let modal=document.getElementById("qrModal");
modal.style.display="flex";
let box=document.getElementById("qrCanvas");
box.innerHTML="";
new QRCode(box,{text:url,width:180,height:180});
}
function closeQR(){document.getElementById("qrModal").style.display="none";}

// PDF HEADER / FOOTER
function header(doc){
doc.setFontSize(10);
doc.text("FIRST STANDARD TITLE LIMITED",20,10);
doc.text("Email: fstlofficialsite@gmail.com | +2348035888622",20,15);
doc.line(20,18,190,18);
}
function footer(doc){
doc.line(20,280,190,280);
doc.setFontSize(8);
doc.text("FSTL COMET OS | Title Verified | Title Insurance Eligible",20,285);
doc.text("Account: 2025222557",20,290);
}

</script>

</body>
</html>
