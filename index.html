<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS – V53 FINAL</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

<style>
body {font-family: Arial; background:#eef2f5; padding:20px;}
.container {max-width:850px;margin:auto;background:#fff;padding:20px;border-radius:8px;}
input, select {width:100%; padding:10px; margin:6px 0;}
button {width:100%; padding:15px; background:#003366; color:#fff; border:none;}
canvas {margin-top:10px;}
</style>
</head>

<body>

<div class="container">
<h2>FSTL COMET OS – VERIFIED PROPERTY DEMO</h2>

<select id="scenario" onchange="prefill()">
<option value="">Select Scenario</option>
<option value="1">Residential</option>
<option value="2">Commercial</option>
<option value="3">Mixed Use</option>
</select>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="ownerAddress" placeholder="Owner Address">
<input id="propertyAddress" placeholder="Property Address">
<input id="bvn" placeholder="BVN">
<input id="nin" placeholder="NIN">
<input id="agent" placeholder="Agent Code">

<button onclick="generatePDF()">GENERATE VERIFIED PROPERTY PDF</button>

<h3>Scan to Verify</h3>
<canvas id="qr"></canvas>
</div>

<script>
const { jsPDF } = window.jspdf;

const scenarios = {
1:{name:"John Doe",phone:"08012345678",email:"john@email.com",ownerAddress:"Abuja Nigeria",propertyAddress:"GRA Benin City",bvn:"12345678901",nin:"98765432101",agent:"AGT-001"},
2:{name:"Jane Smith",phone:"08023456789",email:"jane@email.com",ownerAddress:"Lagos Nigeria",propertyAddress:"Ikeja Lagos",bvn:"23456789012",nin:"87654321098",agent:"AGT-002"},
3:{name:"Michael King",phone:"08034567890",email:"mike@email.com",ownerAddress:"Lagos Nigeria",propertyAddress:"Victoria Island Lagos",bvn:"34567890123",nin:"76543210987",agent:"AGT-003"}
};

function prefill(){
let s = scenarios[scenario.value];
if(!s) return;
name.value=s.name;
phone.value=s.phone;
email.value=s.email;
ownerAddress.value=s.ownerAddress;
propertyAddress.value=s.propertyAddress;
bvn.value=s.bvn;
nin.value=s.nin;
agent.value=s.agent;
}

function header(doc){
doc.setFontSize(10);
doc.text("FIRST STANDARD TITLE LIMITED (FSTL)",20,10);
doc.text("FSTL COMET OS – Verification & Title Insurance Engine",20,15);
doc.line(20,18,190,18);
}

function footer(doc){
doc.line(20,280,190,280);
doc.setFontSize(8);
doc.text("FSTL COMET OS DEMO DOCUMENT",20,285);
doc.text("Contact: +234 803 588 8622 | info@fstl.com.ng",20,290);
}

function addPage(doc,title,lines){
doc.addPage(); header(doc);
doc.setFontSize(14);
doc.text(title,20,30);
doc.setFontSize(10);

let y=45;
lines.forEach(line=>{
doc.text(line,20,y);
y+=8;
});
footer(doc);
}

function generatePDF(){

let id = "FSTL-" + Date.now();
let time = new Date().toLocaleString();

// QR
new QRious({
element: document.getElementById("qr"),
value: "https://fstl-demo/verify?id=" + id,
size:150
});

let qrImg = document.getElementById("qr").toDataURL("image/png");

let doc = new jsPDF();

// PAGE 1 – IMPACT
header(doc);
doc.setFontSize(16);
doc.text("VERIFIED PROPERTY RECORD",20,40);
doc.setFontSize(11);
doc.text("FSTL COMET OS INTELLIGENCE ENGINE",20,50);

doc.text("Verification ID: " + id,20,65);
doc.text("Timestamp: " + time,20,72);

doc.text("STATUS: VERIFIED",20,90);
doc.text("CONFIDENCE LEVEL: HIGH",20,98);

doc.text("Owner: " + name.value,20,115);
doc.text("Property: " + propertyAddress.value,20,123);

doc.text("Scan QR to verify",140,100);
doc.addImage(qrImg,"PNG",140,110,50,50);

footer(doc);

// PAGE 2 – OWNER
addPage(doc,"OWNER IDENTITY",[
"Name: "+name.value,
"Phone: "+phone.value,
"Email: "+email.value,
"Address: "+ownerAddress.value,
"BVN: "+bvn.value,
"NIN: "+nin.value
]);

// PAGE 3 – PROPERTY
addPage(doc,"PROPERTY DETAILS",[
propertyAddress.value
]);

// PAGE 4 – VERIFICATION
addPage(doc,"VERIFICATION STRUCTURE",[
"This property record has been structured using FSTL COMET OS logic.",
"",
"It links identity (BVN + NIN) with property data to create a traceable record.",
"",
"A unique ID and timestamp ensure every record is distinct.",
"",
"AI-assisted validation improves consistency and reduces risk.",
"",
"This forms the foundation for institutional trust."
]);

// PAGE 5 – TITLE INSURANCE
addPage(doc,"TITLE INSURANCE",[
"Title insurance protects ownership against:",
"",
"- Fraudulent sale",
"- Hidden claims",
"- Documentation issues",
"",
"It enhances credibility and enables institutional acceptance.",
"",
"It transforms land into a structured and insurable asset."
]);

// PAGE 6 – WHY IT MATTERS
addPage(doc,"WHY THIS DOCUMENT MATTERS",[
"Land ownership often lacks clarity and consistency.",
"",
"FSTL introduces a structured system that:",
"",
"- Reduces fraud risk",
"- Creates ownership certainty",
"- Standardises records",
"",
"This enables land to become a trusted financial asset."
]);

// PAGE 7 – OWNER USE
addPage(doc,"WHAT YOU CAN DO",[
"Demonstrate ownership clearly",
"Present to financial institutions",
"Transfer property confidently",
"Support inheritance planning"
]);

// PAGE 8 – AGENT
addPage(doc,"AGENT APPLICATION",[
"Act on behalf of clients",
"Generate structured reports",
"Facilitate transactions"
]);

// PAGE 9 – INSTITUTION
addPage(doc,"FOR FINANCIAL INSTITUTIONS",[
"Provides structured verification layer",
"",
"Helps institutions:",
"- Assess ownership credibility",
"- Reduce fraud exposure",
"- Support lending decisions",
"",
"FSTL does not provide loans."
]);

// PAGE 10 – SECURITY
addPage(doc,"SECURITY FEATURES",[
"Verification ID",
"QR Code linkage",
"Timestamp",
"Identity anchors (BVN + NIN)",
"",
"Any alteration invalidates the record integrity."
]);

// PAGE 11 – Q&A
addPage(doc,"FREQUENTLY ASKED QUESTIONS",[
"Is this verifiable? Yes via QR.",
"Is this final? No – demonstration.",
"Can banks use it? Yes in live mode.",
"How is fraud reduced? Through structured verification."
]);

// PAGE 12 – DEMO NOTICE
addPage(doc,"DEMONSTRATION NOTICE",[
"This is a DEMO document.",
"",
"Full verification requires ₦25,000.",
"",
"Live system integrates with institutions."
]);

doc.save(id + ".pdf");

}
</script>

</body>
</html>
