<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS V28 – REVENUE DYNAMO</title>

<style>
body{font-family:Arial;background:#f5f7fa;margin:0}
header{background:#000;color:#fff;text-align:center;padding:15px}
main{padding:15px;max-width:900px;margin:auto}
form,section{background:#fff;padding:15px;margin-top:15px;border-radius:8px}
input,textarea{width:100%;padding:10px;margin-top:5px}
button{margin-top:15px;padding:12px;background:#000;color:#fff;border:none;width:100%}
.notice{background:#ffe8cc;padding:10px;border-radius:6px;margin-top:10px}
.share-btn{background:#25D366}
#qrModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center}
#qrBox{background:#fff;padding:20px;border-radius:10px;text-align:center}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

<header>
<h2>FSTL COMET OS V28 – REVENUE DYNAMO</h2>
<p>Verification. Payment. Proof.</p>
</header>

<main>

<section class="notice">
<strong>PAYMENT FIRST:</strong><br>
FIRST STANDARD TITLE LIMITED<br>
First Bank of Nigeria<br>
<b>Account: 2025222557</b><br><br>
⚠️ Generate receipt ONLY after payment.
</section>

<form id="form">

<input placeholder="Full Name" id="name" required>
<input placeholder="Phone" id="phone" required>

<textarea placeholder="Property Description" id="property" required></textarea>
<input placeholder="Property Location" id="location" required>

<input placeholder="Agent Name + Ref" id="agent" required>
<input placeholder="Total Fee Paid (₦)" id="amount" required>

<label>Upload Payment Proof</label>
<input type="file" id="proof" accept="image/*" required>

<button>GENERATE RECEIPT</button>

</form>

<button id="shareBtn" class="share-btn" style="display:none;">
Share via WhatsApp
</button>

<!-- QR POPUP -->
<div id="qrModal">
<div id="qrBox">
<h3>SCAN TO VERIFY</h3>
<div id="qrCode"></div>
<p id="qrID"></p>
<button onclick="closeQR()">Close</button>
</div>
</div>

</main>

<script>

const FSTL_FEE = 25000;
let lastID = "";

// FORM
document.getElementById('form').addEventListener('submit', function(e){
e.preventDefault();

const name = document.getElementById('name').value;
const phone = document.getElementById('phone').value;
const property = document.getElementById('property').value;
const location = document.getElementById('location').value;
const agent = document.getElementById('agent').value;
const amount = parseInt(document.getElementById('amount').value);
const proof = document.getElementById('proof').files[0];

if(amount < FSTL_FEE){
alert("Minimum ₦25,000 required");
return;
}

if(!proof){
alert("Upload payment proof");
return;
}

const id = "FSTL-"+Date.now();
lastID = id;

const agentProfit = amount - FSTL_FEE;

// SAVE PROOF
const reader = new FileReader();
reader.onload = function(){
const link = document.createElement('a');
link.href = reader.result;
link.download = id+"_proof.png";
link.click();
};
reader.readAsDataURL(proof);

// PDF
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.setFontSize(16);
doc.text("FSTL VERIFICATION RECEIPT",20,20);

doc.setFontSize(12);
doc.text("Verification ID: "+id,20,40);
doc.text("Name: "+name,20,50);
doc.text("Phone: "+phone,20,60);

doc.text("Property:",20,80);
doc.text(property,20,90);
doc.text(location,20,100);

doc.text("Agent: "+agent,20,120);

doc.text("TOTAL PAID: ₦"+amount,20,140);
doc.text("FSTL FEE: ₦"+FSTL_FEE,20,150);
doc.text("AGENT EARNINGS: ₦"+agentProfit,20,160);

doc.text("PAID TO:",20,180);
doc.text("FIRST STANDARD TITLE LIMITED",20,190);
doc.text("First Bank | 2025222557",20,200);

// AUTHORITY
doc.text("STATUS: VERIFIED RECORD",20,220);

// QR
const qrDiv = document.createElement('div');
new QRCode(qrDiv,id);
const qr = qrDiv.querySelector('canvas');
doc.addImage(qr.toDataURL(),"PNG",150,40,40,40);

doc.save(id+".pdf");

// SHOW QR POPUP
showQR(id);

// SHOW SHARE
document.getElementById('shareBtn').style.display="block";

alert("RECEIPT GENERATED");

});

// QR MODAL
function showQR(id){
const modal = document.getElementById('qrModal');
const qrContainer = document.getElementById('qrCode');

qrContainer.innerHTML="";
new QRCode(qrContainer,id);

document.getElementById('qrID').innerText=id;
modal.style.display="flex";
}

function closeQR(){
document.getElementById('qrModal').style.display="none";
}

// WHATSAPP
document.getElementById('shareBtn').addEventListener('click', function(){

const msg = encodeURIComponent(
`FSTL VERIFIED TRANSACTION

ID: ${lastID}
STATUS: VERIFIED

Payment confirmed and recorded.`
);

window.open(`https://wa.me/?text=${msg}`);

});

</script>

</body>
</html>
