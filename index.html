<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS V49 – COURT DEMO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

<style>
body{font-family:Arial;background:#0a0a0a;color:#fff;text-align:center;padding:20px;}
.container{max-width:800px;margin:auto;background:#fff;color:#000;padding:20px;border-radius:8px;}
input,select{width:100%;padding:10px;margin:5px 0;}
button{padding:12px 20px;background:#003366;color:#fff;border:none;margin-top:10px;}
</style>
</head>

<body>

<h2>FSTL COMET OS – DEMONSTRATION MODE</h2>
<p>Land & Property Verification + Title Insurance Engine</p>

<div class="container">

<select id="scenario" onchange="prefill()">
<option value="">Select Scenario</option>
<option value="1">Residential</option>
<option value="2">Commercial</option>
<option value="3">Mixed Use</option>
</select>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Property Address">
<input id="bvn" placeholder="BVN">
<input id="nin" placeholder="NIN">
<input id="agent" placeholder="Agent Name / Code">

<button onclick="generatePDF()">Generate Verification PDF</button>

</div>

<canvas id="qr" style="display:none;"></canvas>

<script>

const scenarios = {
1:{name:"John Doe",phone:"08012345678",address:"GRA Benin City",bvn:"12345678901",nin:"98765432101",agent:"Agent A"},
2:{name:"Jane Smith",phone:"08023456789",address:"Ikeja Lagos",bvn:"23456789012",nin:"87654321098",agent:"Agent B"},
3:{name:"Michael King",phone:"08034567890",address:"Victoria Island Lagos",bvn:"34567890123",nin:"76543210987",agent:"Agent C"}
};

function prefill(){
let s=scenarios[document.getElementById("scenario").value];
if(!s) return;
name.value=s.name;
phone.value=s.phone;
address.value=s.address;
bvn.value=s.bvn;
nin.value=s.nin;
agent.value=s.agent;
}

function generatePDF(){

const { jsPDF } = window.jspdf;

let id="FSTL-"+Date.now();
let time=new Date().toLocaleString();

let qrCanvas=document.getElementById("qr");
new QRious({
element:qrCanvas,
value:"https://fstl-demo/verify?id="+id,
size:150
});

let qrImg=qrCanvas.toDataURL("image/png");

let doc=new jsPDF();

// 🔴 PAGE 1 – CORE
doc.setFontSize(14);
doc.text("FSTL COMET OS – DEMO",20,20);
doc.setFontSize(10);
doc.text("Verification ID: "+id,20,30);
doc.text("Timestamp: "+time,20,36);

doc.text("OWNER:",20,50);
doc.text(name.value,20,56);
doc.text("BVN: "+bvn.value,20,62);
doc.text("NIN: "+nin.value,20,68);

doc.text("PROPERTY:",20,80);
doc.text(address.value,20,86);

doc.addImage(qrImg,"PNG",140,30,50,50);

// 🔴 PAGE 2 – SECURITY
doc.addPage();
doc.text("SECURITY STRUCTURE",20,20);
doc.text("• Unique ID",20,30);
doc.text("• Timestamp",20,36);
doc.text("• QR Verification",20,42);
doc.text("• Identity Anchors (BVN + NIN)",20,48);

doc.text("THIS DOCUMENT REPRESENTS A VERIFICATION RECORD.",20,60);

// 🔴 PAGE 3 – TITLE INSURANCE
doc.addPage();
doc.text("TITLE INSURANCE",20,20);
doc.text("Protects ownership from fraud.",20,30);
doc.text("Enhances trust for institutions.",20,36);
doc.text("Supports collateralisation.",20,42);

doc.text("FSTL ENDS AT:",20,60);
doc.text("• Verification",20,66);
doc.text("• Title Insurance",20,72);

// 🔴 PAGE 4 – APPLICATION
doc.addPage();
doc.text("WHAT YOU CAN DO",20,20);
doc.text("• Present as ownership evidence",20,30);
doc.text("• Approach financial institutions",20,36);
doc.text("• Establish property value",20,42);

// 🔴 PAGE 5 – Q&A
doc.addPage();
doc.text("Q&A",20,20);
doc.text("Q: Is this verifiable?",20,30);
doc.text("A: Yes via QR.",20,36);
doc.text("Q: Can it be altered?",20,50);
doc.text("A: Changes break verification.",20,56);

// 🔴 PAGE 6 – DEMO NOTICE
doc.addPage();
doc.text("DEMONSTRATION NOTICE",20,20);
doc.text("This is NOT a live verification.",20,30);
doc.text("Live service requires ₦25,000.",20,36);

doc.save(id+".pdf");

}

</script>

</body>
</html>
