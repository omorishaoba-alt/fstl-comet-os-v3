<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS – DEMO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

<style>
body {font-family: Arial; background:#eef2f5; padding:20px;}
.container {max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:8px;}
input, select {width:100%; padding:10px; margin:5px 0;}
button {width:100%; padding:15px; background:#003366; color:#fff; border:none;}
canvas {margin-top:10px;}
</style>
</head>

<body>

<div class="container">
<h2>FSTL COMET OS – DEMONSTRATION</h2>

<select id="scenario" onchange="prefill()">
<option value="">Select Scenario</option>
<option value="1">Residential</option>
<option value="2">Commercial</option>
<option value="3">Mixed Use</option>
</select>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Property Address">
<input id="bvn" placeholder="BVN">
<input id="nin" placeholder="NIN">
<input id="agent" placeholder="Agent Code">

<button onclick="generatePDF()">GENERATE PDF</button>

<h3>QR Preview</h3>
<canvas id="qr"></canvas>

</div>

<script>
const { jsPDF } = window.jspdf;

const scenarios = {
1:{name:"John Doe",phone:"08012345678",address:"GRA Benin City",bvn:"12345678901",nin:"98765432101",agent:"AGT-001"},
2:{name:"Jane Smith",phone:"08023456789",address:"Ikeja Lagos",bvn:"23456789012",nin:"87654321098",agent:"AGT-002"},
3:{name:"Michael King",phone:"08034567890",address:"Victoria Island Lagos",bvn:"34567890123",nin:"76543210987",agent:"AGT-003"}
};

function prefill(){
let s = scenarios[scenario.value];
if(!s) return;
name.value=s.name;
phone.value=s.phone;
address.value=s.address;
bvn.value=s.bvn;
nin.value=s.nin;
agent.value=s.agent;
}

function header(doc){
doc.setFontSize(10);
doc.text("FIRST STANDARD TITLE LIMITED (FSTL)",20,10);
doc.text("Verification & Title Insurance System",20,15);
doc.line(20,18,190,18);
}

function footer(doc){
doc.line(20,280,190,280);
doc.setFontSize(8);
doc.text("FSTL COMET OS DEMO",20,285);
doc.text("Contact: +234 803 588 8622",20,290);
}

function generatePDF(){

let id = "FSTL-" + Date.now();
let time = new Date().toLocaleString();

// QR GENERATION
let qr = new QRious({
element: document.getElementById("qr"),
value: "https://fstl-demo/verify?id=" + id,
size:150
});

// Convert QR to image
let qrImage = document.getElementById("qr").toDataURL("image/png");

let doc = new jsPDF();

// PAGE 1
header(doc);
doc.setFontSize(14);
doc.text("PROPERTY VERIFICATION REPORT",20,30);

doc.setFontSize(10);
doc.text("Verification ID: " + id,20,40);
doc.text("Timestamp: " + time,20,46);

doc.text("OWNER DETAILS",20,60);
doc.text("Name: " + name.value,20,70);
doc.text("Phone: " + phone.value,20,76);
doc.text("BVN: " + bvn.value,20,82);
doc.text("NIN: " + nin.value,20,88);

doc.text("PROPERTY DETAILS",20,105);
doc.text(address.value,20,115);

doc.addImage(qrImage,"PNG",140,40,50,50);

footer(doc);

// PAGE 2
doc.addPage(); header(doc);
doc.text("TRANSACTION CONTEXT",20,30);
doc.text("Agent Code: " + agent.value,20,40);
doc.text("Mode: Direct / Agent",20,50);
footer(doc);

// PAGE 3
doc.addPage(); header(doc);
doc.text("VERIFICATION STRUCTURE",20,30);
doc.text("• Unique ID",20,45);
doc.text("• Timestamp",20,55);
doc.text("• BVN + NIN linkage",20,65);
doc.text("• QR verification",20,75);
footer(doc);

// PAGE 4
doc.addPage(); header(doc);
doc.text("TITLE INSURANCE",20,30);
doc.text("Protects ownership against fraud",20,45);
doc.text("Enhances institutional trust",20,55);
doc.text("Supports collateral usage",20,65);
footer(doc);

// PAGE 5
doc.addPage(); header(doc);
doc.text("APPLICATION",20,30);
doc.text("• Ownership proof",20,45);
doc.text("• Bank presentation",20,55);
doc.text("• Asset valuation support",20,65);
footer(doc);

// PAGE 6
doc.addPage(); header(doc);
doc.text("FSTL SCOPE",20,30);
doc.text("Provides Verification & Title Insurance",20,45);
doc.text("Does NOT provide loans",20,55);
footer(doc);

// PAGE 7
doc.addPage(); header(doc);
doc.text("Q&A",20,30);
doc.text("Verifiable? YES via QR",20,45);
doc.text("Final? NO – DEMO",20,55);
footer(doc);

// PAGE 8
doc.addPage(); header(doc);
doc.text("DEMO NOTICE",20,30);
doc.text("Full verification requires ₦25,000",20,45);
footer(doc);

doc.save(id + ".pdf");

}
</script>

</body>
</html> f
