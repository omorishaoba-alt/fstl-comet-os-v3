<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS V37</title>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0}
header,footer{background:#000;color:#fff;text-align:center;padding:15px}
main{padding:15px;max-width:900px;margin:auto}
form{background:#fff;padding:15px;border-radius:8px}
input,textarea{width:100%;padding:10px;margin-top:8px}
button{margin-top:15px;padding:12px;width:100%;background:#000;color:#fff;border:none}
#verifyBox{background:#fff;padding:15px;border-radius:8px}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

<header>
<h2>FSTL COMET OS V37</h2>
<p>LIVE VERIFICATION SYSTEM</p>
</header>

<main id="app"></main>

<footer>
FSTL – Title Verification & Title Insurance ONLY
</footer>

<script>

// CHECK IF QR VERIFICATION MODE
const params = new URLSearchParams(window.location.search);

if(params.has("data")){
renderVerification();
}else{
renderForm();
}

// ---------------- FORM ----------------
function renderForm(){
document.getElementById("app").innerHTML = `
<form id="form">

<h3>OWNER</h3>
<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Phone" required>
<input id="address" placeholder="Address" required>
<input id="bvn" placeholder="BVN" required>
<input id="nin" placeholder="NIN" required>

<h3>PROPERTY</h3>
<textarea id="property" placeholder="Property"></textarea>
<input id="location" placeholder="Location">

<h3>TRANSACTION</h3>
<input id="agent" placeholder="Agent Name + Ref">
<input id="amount" placeholder="Total Paid">

<h3>PAYMENT PROOF</h3>
<input type="file" id="proof" accept="image/*">

<button>GENERATE PDF</button>

</form>
<div id="qr"></div>
`;

document.getElementById("form").onsubmit = generate;
}

// ---------------- GENERATE ----------------
async function generate(e){
e.preventDefault();

const FEE = 25000;

let data = {
id: "FSTL-"+Date.now(),
time: new Date().toLocaleString(),
name: val("name"),
phone: val("phone"),
address: val("address"),
bvn: val("bvn"),
nin: val("nin"),
property: val("property"),
location: val("location"),
agent: val("agent"),
amount: val("amount")
};

data.agentProfit = data.amount - FEE;

// CREATE VERIFICATION URL
let encoded = encodeURIComponent(JSON.stringify(data));
let verifyURL = window.location.origin + window.location.pathname + "?data=" + encoded;

// QR
let qrDiv = document.getElementById("qr");
qrDiv.innerHTML = "<h3>SCAN TO VERIFY</h3>";
new QRCode(qrDiv, verifyURL);

// WAIT QR
await new Promise(r=>setTimeout(r,500));
let qrCanvas = qrDiv.querySelector("canvas");
let qrData = qrCanvas.toDataURL("image/png");

// PAYMENT IMAGE
let proofFile = document.getElementById("proof").files[0];
let proofData = await toBase64(proofFile);

// PDF
const { jsPDF } = window.jspdf;
let doc = new jsPDF();

// HEADER
header(doc);

// PAGE 1
doc.text("TITLE VERIFICATION REPORT",20,30);
doc.text("ID: "+data.id,20,40);
doc.text("TIME: "+data.time,20,46);

doc.text("OWNER",20,60);
doc.text(data.name,20,66);
doc.text(data.phone,20,72);
doc.text(data.address,20,78);
doc.text("BVN: "+data.bvn,20,84);
doc.text("NIN: "+data.nin,20,90);

doc.text("PROPERTY",20,105);
doc.text(data.property,20,111);
doc.text(data.location,20,117);

doc.text("TRANSACTION",20,132);
doc.text("Agent: "+data.agent,20,138);
doc.text("Total: ₦"+data.amount,20,144);
doc.text("FSTL: ₦"+FEE,20,150);
doc.text("Agent Earns: ₦"+data.agentProfit,20,156);

doc.addImage(qrData,"PNG",140,40,50,50);

footer(doc);

// PAGE 2
doc.addPage();
header(doc);

doc.text("LEGAL",20,30);
doc.text("This document is generated under FSTL COMET OS.",20,40);
doc.text("Scan QR to verify authenticity.",20,50);

footer(doc);

// PAGE 3
doc.addPage();
header(doc);

doc.text("PAYMENT PROOF",20,30);
doc.addImage(proofData,"JPEG",20,40,160,100);

footer(doc);

doc.save(data.id+".pdf");
alert("LIVE VERIFICATION PDF GENERATED");
}

// ---------------- VERIFY PAGE ----------------
function renderVerification(){
let data = JSON.parse(decodeURIComponent(params.get("data")));

document.getElementById("app").innerHTML = `
<div id="verifyBox">
<h3>VERIFICATION CONFIRMED</h3>

<p><b>ID:</b> ${data.id}</p>
<p><b>TIME:</b> ${data.time}</p>

<p><b>NAME:</b> ${data.name}</p>
<p><b>PHONE:</b> ${data.phone}</p>
<p><b>ADDRESS:</b> ${data.address}</p>

<p><b>BVN:</b> ${data.bvn}</p>
<p><b>NIN:</b> ${data.nin}</p>

<p><b>PROPERTY:</b> ${data.property}</p>
<p><b>LOCATION:</b> ${data.location}</p>

<p><b>AGENT:</b> ${data.agent}</p>
<p><b>TOTAL:</b> ₦${data.amount}</p>

<p><b>STATUS:</b> VERIFIED & ELIGIBLE FOR TITLE INSURANCE</p>
</div>
`;
}

// ---------------- HELPERS ----------------
function val(id){return document.getElementById(id).value;}
function toBase64(file){
return new Promise((res,rej)=>{
let r=new FileReader();
r.readAsDataURL(file);
r.onload=()=>res(r.result);
r.onerror=e=>rej(e);
});
}

function header(doc){
doc.setFontSize(10);
doc.text("FIRST STANDARD TITLE LIMITED",20,10);
doc.line(20,12,190,12);
}

function footer(doc){
doc.line(20,280,190,280);
doc.setFontSize(8);
doc.text("FSTL COMET OS | Title Verified. Title Insurable.",20,285);
}

</script>

</body>
</html>
