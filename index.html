<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS V32 – IRREFUTABLE DYNAMO</title>

<style>
body{font-family:Arial;background:#f5f7fa;margin:0}
header,footer{background:#000;color:#fff;text-align:center;padding:15px}
main{padding:15px;max-width:900px;margin:auto}
form{background:#fff;padding:15px;border-radius:8px}
input,textarea{width:100%;padding:10px;margin-top:8px}
button{margin-top:15px;padding:12px;width:100%;background:#000;color:#fff;border:none}
#qrBox{text-align:center;margin-top:20px}
#shareBtn{background:#25D366}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

<header>
<h2>FSTL COMET OS V32</h2>
<p>Title Verification & Title Insurance System</p>
<p>FIRST STANDARD TITLE LIMITED – First Bank: 2025222557</p>
</header>

<main>

<form id="form">

<h3>OWNER IDENTITY</h3>
<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Phone" required>
<input id="address" placeholder="Address" required>
<input id="bvn" placeholder="BVN" required>
<input id="nin" placeholder="NIN" required>

<h3>PROPERTY DETAILS</h3>
<textarea id="property" placeholder="Property Description" required></textarea>
<input id="location" placeholder="Property Location" required>

<h3>TRANSACTION</h3>
<input id="agent" placeholder="Agent Name + Ref" required>
<input id="amount" placeholder="Total Fee Paid" required>

<h3>PAYMENT PROOF</h3>
<input type="file" id="proof" accept="image/*" required>

<button>GENERATE IRREFUTABLE PDF</button>

</form>

<div id="qrBox"></div>

<button id="shareBtn">SHARE VIA WHATSAPP</button>

</main>

<footer>
FSTL COMET OS – Title Verified. Title Insurable. Mortgage NOT Included.
</footer>

<script>

let pdfName="";

const FSTL_FEE = 25000;

document.getElementById("form").addEventListener("submit",function(e){
e.preventDefault();

const name = document.getElementById("name").value;
const phone = document.getElementById("phone").value;
const address = document.getElementById("address").value;
const bvn = document.getElementById("bvn").value;
const nin = document.getElementById("nin").value;

const property = document.getElementById("property").value;
const location = document.getElementById("location").value;

const agent = document.getElementById("agent").value;
const amount = parseInt(document.getElementById("amount").value);

const proofFile = document.getElementById("proof").files[0];

if(amount < FSTL_FEE){
alert("Minimum ₦25,000 required");
return;
}

const agentProfit = amount - FSTL_FEE;
const id = "FSTL-" + Date.now();
const time = new Date().toLocaleString();

// QR GENERATION
const qrDiv = document.getElementById("qrBox");
qrDiv.innerHTML = "";
new QRCode(qrDiv, id);

setTimeout(()=>{

const canvas = qrDiv.querySelector("canvas");
const qrData = canvas.toDataURL();

// READ IMAGE
const reader = new FileReader();
reader.onload = function(event){

const proofImg = event.target.result;

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.setFontSize(14);
doc.text("FSTL TITLE VERIFICATION & INSURANCE REPORT",20,20);

doc.setFontSize(10);
doc.text("Verification ID: "+id,20,30);
doc.text("Timestamp: "+time,20,36);

doc.text("OWNER IDENTITY",20,50);
doc.text(name,20,56);
doc.text(phone,20,62);
doc.text(address,20,68);
doc.text("BVN: "+bvn,20,74);
doc.text("NIN: "+nin,20,80);

doc.text("PROPERTY DETAILS",20,95);
doc.text(property,20,101);
doc.text(location,20,107);

doc.text("TRANSACTION",20,122);
doc.text("Agent: "+agent,20,128);
doc.text("Total Paid: ₦"+amount,20,134);
doc.text("FSTL Fee: ₦"+FSTL_FEE,20,140);
doc.text("Agent Earnings: ₦"+agentProfit,20,146);

doc.text("LEGAL DECLARATION",20,165);
doc.text("This document certifies that the above property details",20,171);
doc.text("have been submitted and verified under FSTL COMET OS.",20,177);
doc.text("This title qualifies for FSTL Title Insurance.",20,183);
doc.text("FSTL provides ONLY Title Verification and Title Insurance.",20,189);
doc.text("Mortgage or lending is NOT within scope.",20,195);

doc.addImage(qrData,"PNG",140,30,50,50);

doc.addPage();

doc.text("PAYMENT PROOF",20,20);
doc.addImage(proofImg,"JPEG",20,30,160,100);

pdfName = id+".pdf";
doc.save(pdfName);

alert("IRREFUTABLE PDF GENERATED");

};

reader.readAsDataURL(proofFile);

},500);

});

// WHATSAPP SHARE
document.getElementById("shareBtn").onclick=function(){
if(!pdfName){
alert("Generate PDF first");
return;
}
const msg = encodeURIComponent(
"FSTL PROPERTY VERIFIED\nID: "+pdfName+"\nTitle Verified & Insurable"
);
window.open("https://wa.me/?text="+msg);
};

</script>

</body>
</html>y
